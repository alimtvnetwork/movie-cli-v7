name: Release

on:
  ## Trigger ONLY on release/** branches.
  ## We intentionally do NOT trigger on `v*` tags — the
  ## `softprops/action-gh-release@v2` step below CREATES the tag as part of
  ## publishing the release. If we also triggered on tags, GitHub would fire
  ## a SECOND parallel workflow run for the same version, which races the
  ## first run and clobbers the release halfway through asset upload —
  ## leaving a partial release with missing archives. This actually
  ## happened on v2.97.0 (3 of 6 archives missing).
  ## See: spec/12-ci-cd-pipeline/05-ci-cd-issues/07-release-dual-trigger-race.md
  push:
    branches:
      - "release/**"

## Concurrency is per release branch so a re-push of the same release/vX.Y.Z
## branch never races itself. cancel-in-progress: false because partial
## release uploads must NEVER be interrupted.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Resolve version
        id: version
        run: |
          ## Tags are NOT a trigger anymore (see top of file). The release
          ## tag is CREATED by softprops/action-gh-release at publish time.
          if [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            VERSION="${GITHUB_REF_NAME#release/}"
          else
            echo "::error::Unexpected ref: $GITHUB_REF (this workflow only runs on release/** branches)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Embed icon for Windows builds
        run: |
          go install github.com/tc-hib/go-winres@v0.3.3
          go-winres init
          if [ -f "assets/icon.ico" ]; then
            cp assets/icon.ico winres/icon.ico
            cp assets/icon.ico winres/icon16.ico
          elif [ -f "assets/icon.png" ]; then
            cp assets/icon.png winres/icon.png
            cp assets/icon.png winres/icon16.png
          fi
          go-winres make

      - name: Build release binaries
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${GITHUB_SHA:0:10}"
          BUILD_DATE="$(date -u '+%Y-%m-%d')"
          LDFLAGS="-s -w \
            -X 'github.com/alimtvnetwork/movie-cli-v5/version.Version=$VERSION' \
            -X 'github.com/alimtvnetwork/movie-cli-v5/version.Commit=$COMMIT' \
            -X 'github.com/alimtvnetwork/movie-cli-v5/version.BuildDate=$BUILD_DATE'"

          TARGETS=(
            "windows/amd64/.exe"
            "windows/arm64/.exe"
            "linux/amd64/"
            "linux/arm64/"
            "darwin/amd64/"
            "darwin/arm64/"
          )

          mkdir -p dist

          for target in "${TARGETS[@]}"; do
            IFS='/' read -r os arch ext <<< "$target"
            OUTPUT="dist/movie-${VERSION}-${os}-${arch}${ext}"
            echo "Building $OUTPUT..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -ldflags "$LDFLAGS" -o "$OUTPUT" .
          done

      - name: Compress and checksum
        working-directory: dist
        run: |
          for f in movie-*-windows-*; do
            [[ -f "$f" ]] && zip "${f%.exe}.zip" "$f" && rm "$f"
          done
          for f in movie-*-linux-* movie-*-darwin-*; do
            [[ -f "$f" ]] && tar czf "${f}.tar.gz" "$f" && rm "$f"
          done

          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Verify all 6 archives are present
        working-directory: dist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REQUIRED=(
            "movie-${VERSION}-windows-amd64.zip"
            "movie-${VERSION}-windows-arm64.zip"
            "movie-${VERSION}-linux-amd64.tar.gz"
            "movie-${VERSION}-linux-arm64.tar.gz"
            "movie-${VERSION}-darwin-amd64.tar.gz"
            "movie-${VERSION}-darwin-arm64.tar.gz"
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            if [[ ! -f "$f" ]]; then
              MISSING+=("$f")
            fi
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Release is missing required archives — refusing to publish a partial release:"
            for f in "${MISSING[@]}"; do echo "::error::  missing: $f"; done
            echo "::error::See spec/12-ci-cd-pipeline/05-ci-cd-issues/06-release-missing-asset-404.md"
            exit 1
          fi
          echo "OK — all 6 archives present"

      - name: Generate version-specific install script (PowerShell)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          cat > dist/install.ps1 << 'PSEOF'
          # movie CLI installer — compatible with: irm ... | iex
          # Usage: irm https://github.com/REPO_PLACEHOLDER/releases/download/VERSION_PLACEHOLDER/install.ps1 | iex

          $ErrorActionPreference = "Stop"
          $PinnedVersion = "VERSION_PLACEHOLDER"
          $Repo = "REPO_PLACEHOLDER"
          $BinaryName = "movie.exe"

          function Write-Step([string]$msg) { Write-Host "  $msg" -ForegroundColor Cyan }
          function Write-OK([string]$msg)   { Write-Host "  $msg" -ForegroundColor Green }
          function Write-Err([string]$msg)  { Write-Host "  $msg" -ForegroundColor Red }

          function Resolve-InstallDir {
              return Join-Path $env:LOCALAPPDATA "movie"
          }

          function Resolve-Arch {
              $cpu = $env:PROCESSOR_ARCHITECTURE
              switch ($cpu) {
                  "AMD64" { return "amd64" }
                  "ARM64" { return "arm64" }
                  default { return "amd64" }
              }
          }

          function Get-Asset([string]$version, [string]$arch) {
              $assetName = "movie-${version}-windows-${arch}.zip"
              $baseUrl = "https://github.com/$Repo/releases/download/$version"
              $assetUrl = "$baseUrl/$assetName"
              $checksumUrl = "$baseUrl/checksums.txt"

              $tmpDir = Join-Path $env:TEMP "movie-install-$(Get-Random)"
              New-Item -ItemType Directory -Path $tmpDir -Force | Out-Null

              $zipPath = Join-Path $tmpDir $assetName
              $checksumPath = Join-Path $tmpDir "checksums.txt"

              Write-Step "Downloading $assetName ($version)..."
              try {
                  Invoke-WebRequest -Uri $assetUrl -OutFile $zipPath -UseBasicParsing
                  Invoke-WebRequest -Uri $checksumUrl -OutFile $checksumPath -UseBasicParsing
              }
              catch {
                  $statusCode = $null
                  if ($_.Exception.Response) { $statusCode = [int]$_.Exception.Response.StatusCode }
                  Remove-Item $tmpDir -Recurse -Force -ErrorAction SilentlyContinue
                  if ($statusCode -eq 404) {
                      Write-Err "Download failed: Not Found (HTTP 404)"
                      Write-Err "  $assetUrl"
                      Write-Host ""
                      Write-Host "  This release is missing the Windows archive for your architecture." -ForegroundColor Yellow
                      Write-Host "  This is a publisher-side issue (the release was uploaded incomplete)." -ForegroundColor Yellow
                      Write-Host ""
                      Write-Host "  Workarounds:" -ForegroundColor Cyan
                      Write-Host "    1. Try a different release tag:" -ForegroundColor Gray
                      Write-Host "       https://github.com/$Repo/releases" -ForegroundColor White
                      Write-Host "    2. Build from source:" -ForegroundColor Gray
                      Write-Host "       git clone https://github.com/$Repo.git; cd $($Repo.Split('/')[-1]); ./run.ps1" -ForegroundColor White
                      Write-Host ""
                  } else {
                      Write-Err "Download failed: $_"
                  }
                  exit 1
              }

              Write-Step "Verifying checksum..."
              $expectedLine = (Get-Content $checksumPath | Where-Object { $_ -match $assetName })
              if (-not $expectedLine) {
                  Write-Err "Asset not found in checksums.txt"
                  Remove-Item $tmpDir -Recurse -Force -ErrorAction SilentlyContinue
                  exit 1
              }

              $expectedHash = ($expectedLine -split '\s+')[0]
              $actualHash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()

              if ($actualHash -ne $expectedHash) {
                  Write-Err "Checksum mismatch! Expected: $expectedHash Got: $actualHash"
                  Remove-Item $tmpDir -Recurse -Force -ErrorAction SilentlyContinue
                  exit 1
              }

              Write-OK "Checksum verified."
              return @{ ZipPath = $zipPath; TmpDir = $tmpDir }
          }

          function Install-Binary([string]$zipPath, [string]$installDir) {
              Write-Step "Installing to $installDir..."
              if (-not (Test-Path $installDir)) {
                  New-Item -ItemType Directory -Path $installDir -Force | Out-Null
              }

              $targetPath = Join-Path $installDir $BinaryName

              if (Test-Path $targetPath) {
                  $oldPath = "$targetPath.old"
                  if (Test-Path $oldPath) { Remove-Item $oldPath -Force }
                  Rename-Item $targetPath $oldPath -Force
              }

              $extractDir = Join-Path $installDir ".install-extract"
              if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
              New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
              Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

              $extracted = Get-ChildItem -Path $extractDir -File -Recurse |
                  Where-Object { $_.Name -match "^movie" -and $_.Extension -eq ".exe" } |
                  Select-Object -First 1

              if (-not $extracted) {
                  Remove-Item $extractDir -Recurse -Force
                  Write-Err "Archive did not contain movie executable"
                  exit 1
              }

              Move-Item $extracted.FullName $targetPath -Force
              Remove-Item $extractDir -Recurse -Force -ErrorAction SilentlyContinue

              $oldPath = "$targetPath.old"
              if (Test-Path $oldPath) { Remove-Item $oldPath -Force -ErrorAction SilentlyContinue }

              Write-OK "Installed $BinaryName to $installDir"
          }

          function Add-ToPath([string]$dir) {
              $currentUserPath = [Environment]::GetEnvironmentVariable("PATH", "User")
              $parts = if ($currentUserPath) { $currentUserPath -split ";" } else { @() }
              $hasDir = $parts | Where-Object { $_.Trim() -ieq $dir }

              if (-not $hasDir) {
                  $newPath = if ([string]::IsNullOrWhiteSpace($currentUserPath)) { $dir } else { $currentUserPath.TrimEnd(";") + ";" + $dir }
                  [Environment]::SetEnvironmentVariable("PATH", $newPath, "User")
                  Write-OK "Added to user PATH (persistent)."
              } else {
                  Write-Step "Already in user PATH (persistent)."
              }

              # Also refresh the CURRENT session so 'movie' works immediately
              # without opening a new terminal. PowerShell snapshots $env:PATH
              # at shell startup; SetEnvironmentVariable only affects FUTURE
              # sessions, which is why users see "command not found" right
              # after install even though PATH was updated correctly.
              $sessionParts = if ($env:PATH) { $env:PATH -split ";" } else { @() }
              $hasSessionDir = $sessionParts | Where-Object { $_.Trim() -ieq $dir }
              if (-not $hasSessionDir) {
                  $env:PATH = if ([string]::IsNullOrWhiteSpace($env:PATH)) { $dir } else { $env:PATH.TrimEnd(";") + ";" + $dir }
                  Write-OK "Refreshed PATH for current session."
              }
          }

          # --- Main ---

          Write-Host ""
          Write-Host "  movie installer ($PinnedVersion)" -ForegroundColor White
          Write-Host "  github.com/$Repo" -ForegroundColor DarkGray
          Write-Host ""

          $resolvedArch = Resolve-Arch
          $resolvedDir  = Resolve-InstallDir

          $result = Get-Asset $PinnedVersion $resolvedArch
          try { Install-Binary $result.ZipPath $resolvedDir }
          finally { Remove-Item $result.TmpDir -Recurse -Force -ErrorAction SilentlyContinue }

          Add-ToPath $resolvedDir

          $binPath = Join-Path $resolvedDir $BinaryName
          if (Test-Path $binPath) {
              Write-Host ""
              try {
                  $versionOutput = & $binPath version 2>&1
                  Write-OK "  movie $versionOutput"
              } catch {
                  Write-Err "  Binary found but failed to run: $_"
              }
          }

          Write-Host ""
          Write-OK "  Done! Run 'movie --help' to get started."
          Write-Host ""
          PSEOF

          sed -i "s|VERSION_PLACEHOLDER|$VERSION|g" dist/install.ps1
          sed -i "s|REPO_PLACEHOLDER|$REPO|g" dist/install.ps1

      - name: Generate version-specific install.sh
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          cat > dist/install.sh << 'SHEOF'
          #!/usr/bin/env bash
          set -euo pipefail

          PINNED_VERSION="VERSION_PLACEHOLDER"
          REPO="REPO_PLACEHOLDER"
          BINARY_NAME="movie"
          INSTALL_DIR=""
          ARCH=""
          NO_PATH=false

          usage() {
              echo "Usage: install.sh [--version VERSION] [--dir DIR] [--arch ARCH] [--no-path]"
              exit 0
          }

          while [[ $# -gt 0 ]]; do
              case "$1" in
                  --version) PINNED_VERSION="$2"; shift 2 ;;
                  --dir)     INSTALL_DIR="$2"; shift 2 ;;
                  --arch)    ARCH="$2"; shift 2 ;;
                  --no-path) NO_PATH=true; shift ;;
                  --help|-h) usage ;;
                  *)         echo "Unknown flag: $1"; usage ;;
              esac
          done

          detect_os() {
              local os
              os="$(uname -s | tr '[:upper:]' '[:lower:]')"
              case "$os" in
                  linux)  echo "linux" ;;
                  darwin) echo "darwin" ;;
                  *)      echo "❌ Unsupported OS: $os. Use install.ps1 for Windows." >&2; exit 1 ;;
              esac
          }

          detect_arch() {
              if [[ -n "$ARCH" ]]; then echo "$ARCH"; return; fi
              local arch
              arch="$(uname -m)"
              case "$arch" in
                  x86_64|amd64)   echo "amd64" ;;
                  aarch64|arm64)  echo "arm64" ;;
                  *)              echo "❌ Unsupported architecture: $arch" >&2; exit 1 ;;
              esac
          }

          download() {
              local url="$1" dest="$2"
              if command -v curl &>/dev/null; then
                  curl -fsSL "$url" -o "$dest"
              elif command -v wget &>/dev/null; then
                  wget -qO "$dest" "$url"
              else
                  echo "❌ Neither curl nor wget found." >&2; exit 1
              fi
          }

          verify_checksum() {
              local file="$1" checksums="$2" asset_name="$3"
              local expected actual
              expected="$(grep "$asset_name" "$checksums" | awk '{print $1}')"
              if [[ -z "$expected" ]]; then
                  echo "❌ Asset $asset_name not found in checksums.txt" >&2; exit 1
              fi
              if command -v sha256sum &>/dev/null; then
                  actual="$(sha256sum "$file" | awk '{print $1}')"
              else
                  actual="$(shasum -a 256 "$file" | awk '{print $1}')"
              fi
              if [[ "$actual" != "$expected" ]]; then
                  echo "❌ Checksum mismatch! Expected: $expected Got: $actual" >&2; exit 1
              fi
              echo "  ✅ Checksum verified."
          }

          add_to_path() {
              local dir="$1"
              if [[ "$NO_PATH" == "true" ]]; then return; fi

              # Always export for THIS script's process tree so the
              # post-install verification step (`movie version`) works.
              # When the script is invoked via `curl … | bash`, this
              # export dies with the subshell — it CANNOT reach the
              # user's interactive parent shell. That's a Unix
              # process-isolation rule, not a bug. We print a
              # copy-paste one-liner at the end so the user can
              # refresh their current shell in one step.
              export PATH="$dir:$PATH"

              local shell_name rc_file export_line
              shell_name="$(basename "${SHELL:-/bin/bash}")"
              case "$shell_name" in
                  zsh)  rc_file="$HOME/.zshrc" ;;
                  fish) rc_file="$HOME/.config/fish/config.fish" ;;
                  *)    rc_file="$HOME/.bashrc" ;;
              esac

              if [[ "$shell_name" == "fish" ]]; then
                  export_line="fish_add_path $dir"
              else
                  export_line="export PATH=\"$dir:\$PATH\""
              fi

              if [[ -f "$rc_file" ]] && grep -qF "$dir" "$rc_file"; then
                  echo "  Already in $rc_file (new shells will pick it up)."
              else
                  echo "" >> "$rc_file"
                  echo "$export_line" >> "$rc_file"
                  echo "  ✅ Added to $rc_file (new shells will pick it up)."
              fi

              # Stash for the final-message hint — the parent shell
              # needs this one-liner to see the new PATH without
              # opening a fresh terminal.
              REFRESH_HINT="$export_line"
              REFRESH_RC="$rc_file"
          }

          main() {
              local os arch version install_dir
              os="$(detect_os)"
              arch="$(detect_arch)"
              version="$PINNED_VERSION"
              install_dir="${INSTALL_DIR:-$HOME/.local/bin}"

              echo ""
              echo "  movie installer ($version)"
              echo "  github.com/$REPO"
              echo ""

              local base_url="https://github.com/$REPO/releases/download/$version"
              local asset_name="${BINARY_NAME}-${version}-${os}-${arch}.tar.gz"
              local tmp_dir
              tmp_dir="$(mktemp -d)"

              trap 'rm -rf "$tmp_dir"' EXIT

              echo "  Downloading $asset_name..."
              download "$base_url/$asset_name" "$tmp_dir/$asset_name"
              download "$base_url/checksums.txt" "$tmp_dir/checksums.txt"

              verify_checksum "$tmp_dir/$asset_name" "$tmp_dir/checksums.txt" "$asset_name"

              echo "  Installing to $install_dir..."
              mkdir -p "$install_dir"

              tar xzf "$tmp_dir/$asset_name" -C "$tmp_dir"

              local binary
              binary="$(find "$tmp_dir" -type f -name "${BINARY_NAME}*" ! -name "*.tar.gz" ! -name "checksums.txt" | head -1)"
              if [[ -z "$binary" ]]; then
                  echo "❌ Binary not found in archive" >&2; exit 1
              fi

              local target="$install_dir/$BINARY_NAME"
              if [[ -f "$target" ]]; then
                  mv "$target" "$target.old"
              fi
              mv "$binary" "$target"
              chmod +x "$target"
              rm -f "$target.old" 2>/dev/null || true

              echo "  ✅ Installed $BINARY_NAME to $install_dir"

              add_to_path "$install_dir"

              if command -v "$target" &>/dev/null; then
                  echo ""
                  echo "  ✅ $("$target" version 2>&1 || echo "$version")"
              fi
              echo ""
              echo "  Done! Run 'movie --help' to get started."
              echo ""

              # If we modified an rc file, the parent (interactive)
              # shell still has the old PATH because a child process
              # cannot mutate its parent's environment. Give the user
              # a one-liner to refresh the current shell instead of
              # forcing them to open a new terminal.
              if [[ -n "${REFRESH_HINT:-}" ]]; then
                  echo "  ⚡ To use 'movie' in THIS shell right now, run:"
                  echo ""
                  echo "      $REFRESH_HINT"
                  echo ""
                  echo "  (Or open a new terminal — ${REFRESH_RC:-your shell rc} was already updated.)"
                  echo ""
              fi
          }

          main
          SHEOF

          sed -i "s|VERSION_PLACEHOLDER|$VERSION|g" dist/install.sh
          sed -i "s|REPO_PLACEHOLDER|$REPO|g" dist/install.sh
          chmod +x dist/install.sh

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ENTRY=$(awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if (index($0, ver)) found=1
            }
            found { print }
          ' CHANGELOG.md 2>/dev/null || echo "")

          if [ -z "$ENTRY" ]; then
            ENTRY="Release $VERSION"
          fi

          echo "$ENTRY" > /tmp/changelog-entry.md

      - name: Build release body
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          COMMIT_SHA="${GITHUB_SHA}"
          BRANCH="${GITHUB_REF_NAME}"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          cat > /tmp/release-body.md << EOF
          $(cat /tmp/changelog-entry.md)

          ---

          ## Release Info

          | Field | Value |
          |-------|-------|
          | Version | \`$VERSION\` |
          | Commit | \`${COMMIT_SHA:0:10}\` |
          | Branch | \`$BRANCH\` |
          | Build Date | $BUILD_DATE |
          | Go Version | $(go version | awk '{print $3}') |

          ## Checksums (SHA256)

          \`\`\`
          $(cat dist/checksums.txt)
          \`\`\`

          ## Install

          ### Quick install (Windows PowerShell)

          \`\`\`powershell
          irm https://github.com/$REPO/releases/download/$VERSION/install.ps1 | iex
          \`\`\`

          ### Quick install (Linux / macOS)

          \`\`\`bash
          curl -fsSL https://github.com/$REPO/releases/download/$VERSION/install.sh | bash
          \`\`\`

          ### Manual download

          Download the appropriate archive for your platform from the assets below, extract, and place the binary in your PATH.

          ## Assets

          | Platform | Architecture | File |
          |----------|-------------|------|
          | Windows | amd64 | \`movie-$VERSION-windows-amd64.zip\` |
          | Windows | arm64 | \`movie-$VERSION-windows-arm64.zip\` |
          | Linux | amd64 | \`movie-$VERSION-linux-amd64.tar.gz\` |
          | Linux | arm64 | \`movie-$VERSION-linux-arm64.tar.gz\` |
          | macOS | amd64 | \`movie-$VERSION-darwin-amd64.tar.gz\` |
          | macOS | arm64 | \`movie-$VERSION-darwin-arm64.tar.gz\` |
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: /tmp/release-body.md
          files: dist/*
          draft: false
          prerelease: false
