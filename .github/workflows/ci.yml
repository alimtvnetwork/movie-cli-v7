name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Gate: SHA deduplication ───────────────────────────────
  sha-check:
    name: SHA Check
    runs-on: ubuntu-latest
    outputs:
      already-built: ${{ steps.cache-check.outputs.cache-hit }}
    steps:
      - name: Check SHA cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}
          lookup-only: true

  # ─── Lint ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [sha-check]
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed — skipping lint"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        if: needs.sha-check.outputs.already-built != 'true'
        run: go mod download

      - name: Go vet
        id: govet
        if: needs.sha-check.outputs.already-built != 'true'
        run: go vet ./...

      - name: golangci-lint
        if: needs.sha-check.outputs.already-built != 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

      - name: Acronym MixedCaps guard
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          # Enforce spec/01-coding-guidelines/.../09-acronym-naming.md:
          # No identifier may contain IMDb|TMDb|API|HTTP|URL|JSON|SQL|HTML|XML
          # immediately followed by another uppercase letter.
          #
          # IMPORTANT: this guard inspects IDENTIFIERS ONLY. Line, block, and
          # trailing comments (// ... and /* ... */) plus string/rune literals
          # are stripped before matching, so prose like "the OMDb HTTPS URL"
          # in a doc comment is intentionally allowed.
          set -e
          python3 scripts/check-acronym-naming.py


      - name: Forbidden term guard
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          # The project name is "movie". The previous legacy name and any
          # derived patterns (/tmp/<legacy>, <LEGACY>_DB, .<legacy>/,
          # <legacy>-cli, etc.) are permanently banned across the repo.
          set -e
          # Patterns that must never appear. Case-insensitive.
          # NOTE: split string literals so this file itself doesn't trip the guard.
          patterns=( 'm''ahin' 'M''AHIN' )
          violations=$(grep -rn -E -i \
              --exclude-dir=.git --exclude-dir=.release --exclude-dir=node_modules \
              --exclude-dir=dist --exclude-dir=build \
              --exclude=CHANGELOG.md \
              --exclude=ci.yml \
              -e "$(IFS='|'; echo "${patterns[*]}")" . 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "Forbidden legacy-name references found:"
            echo "$violations"
            echo ""
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              file=$(printf '%s' "$line" | cut -d: -f1)
              lineno=$(printf '%s' "$line" | cut -d: -f2)
              content=$(printf '%s' "$line" | cut -d: -f3-)
              echo "::error file=${file},line=${lineno}::Forbidden legacy name: ${content}"
            done <<< "$violations"
            echo ""
            echo "The legacy project name is permanently banned. Use 'movie' instead."
            echo "Also banned: /tmp/<legacy>, <LEGACY>_DB, .<legacy>/, <legacy>-cli."
            exit 1
          fi
          echo "✅ No forbidden legacy-name references."


      - name: Old module path regression guard
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          # The project went through multiple module path iterations:
          #   v2, v3, v4, v5, v6: all retired
          # Current (v7): github.com/alimtvnetwork/movie-cli-v7
          # Any reference to old v2-v6 module paths is a regression.
          #
          # Historical records (CHANGELOG.md, spec/) and this workflow file
          # itself legitimately mention old paths and are excluded from the
          # scan.
          set -e
          PATTERNS='movie-cli-v[23456]'
          violations=$(grep -rn -E "$PATTERNS" --include='*.go' --include='*.md' --include='*.mmd' \
              --include='*.json' --include='*.yml' --include='*.yaml' \
              --include='*.sh' --include='*.ps1' --include='Makefile' \
              --exclude-dir=.git --exclude-dir=.release --exclude-dir=node_modules \
              --exclude-dir=.gitmap --exclude-dir=spec \
              --exclude=CHANGELOG.md --exclude=ci.yml \
              . 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "Old module path references found (v2-v6):"
            echo "$violations"
            echo ""
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              file=$(printf '%s' "$line" | cut -d: -f1)
              lineno=$(printf '%s' "$line" | cut -d: -f2)
              content=$(printf '%s' "$line" | cut -d: -f3-)
              echo "::error file=${file},line=${lineno}::Old module path (v2-v6): ${content}"
            done <<< "$violations"
            echo ""
            echo "Current module: github.com/alimtvnetwork/movie-cli-v7"
            echo "Old modules v2-v6 must never be referenced."
            echo "Fix: update all imports and references to movie-cli-v7."
            exit 1
          fi
          echo "✅ No old module path (v2-v6) regressions."

      - name: Command-index drift guard
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          # README.md contains two flavours of the alphabetical command index
          # (HTML table + monospace text block). Both are generated from
          # scripts/gen-command-index.py — the script is the single source
          # of truth. If either block drifts, fail the build with a clear
          # message so the contributor regenerates them in one command.
          set -e
          if ! python3 scripts/gen-command-index.py --check; then
            echo "::error file=README.md::Command index is stale. Run: python3 scripts/gen-command-index.py"
            exit 1
          fi
          echo "✅ README command index in sync with scripts/gen-command-index.py."

      - name: QUICKSTART link & platform guard
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          # Ensure QUICKSTART.md exists, is linked from README.md, and has
          # command blocks for Linux, macOS, and Windows.
          bash scripts/check-quickstart.sh .

      - name: User-facing docs v6 reference guard
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          # Ensure no user-facing doc or install script still points users at
          # github.com/alimtvnetwork/movie-cli-v6. The broader v2-v6 guard
          # excludes README.md, scripts, and root install/get/verify/bootstrap
          # files via its include filters, so this targeted guard catches any
          # regression in exactly the surfaces a new user copy-pastes from.
          set -e
          TARGETS=(
            README.md
            QUICKSTART.md
            install.sh install.ps1
            get.sh    get.ps1
            verify.sh verify.ps1
            bootstrap.sh bootstrap.ps1
          )
          existing=()
          for f in "${TARGETS[@]}"; do
            [ -f "$f" ] && existing+=("$f")
          done
          # Add scripts/ directory if it exists.
          [ -d scripts ] && existing+=(scripts)

          PATTERN='github\.com/alimtvnetwork/movie-cli-v6\b'
          violations=$(grep -rnE "$PATTERN" "${existing[@]}" 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "User-facing v6 references found (must be movie-cli-v7):"
            echo "$violations"
            echo ""
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              file=$(printf '%s' "$line" | cut -d: -f1)
              lineno=$(printf '%s' "$line" | cut -d: -f2)
              content=$(printf '%s' "$line" | cut -d: -f3-)
              echo "::error file=${file},line=${lineno}::User-facing doc still points to movie-cli-v6: ${content}"
            done <<< "$violations"
            echo ""
            echo "Fix: replace github.com/alimtvnetwork/movie-cli-v6 with github.com/alimtvnetwork/movie-cli-v7."
            exit 1
          fi
          echo "✅ No user-facing references to movie-cli-v6 in README, QUICKSTART, or install scripts."

      - name: Legacy module-path auditor (strict)
        id: legacy-audit
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          # Repo-wide audit covering 4 variants:
          #   VERSIONED   — movie-cli-v[1-6]
          #   UNVERSIONED — github.com/alimtvnetwork/movie-cli (no -vN)
          #   TAGGED      — movie-cli[-vN]@vX.Y.Z pinned tags
          #   REPLACE     — go.mod `replace` directives pointing at movie-cli
          #
          # Reports are always generated (pass or fail) and uploaded as a
          # build artifact for easy review.
          set +e
          mkdir -p audit-reports
          bash scripts/audit-legacy-paths.sh        > audit-reports/legacy-audit.txt  2>&1
          bash scripts/audit-legacy-paths.sh --json > audit-reports/legacy-audit.json 2>/dev/null
          bash scripts/audit-legacy-paths.sh --strict
          rc=$?
          set -e
          # Surface the human-readable report in the job log.
          echo "── Legacy module-path audit report ──"
          cat audit-reports/legacy-audit.txt
          if [ "$rc" -ne 0 ]; then
            echo ""
            echo "::error::Legacy module-path auditor found ACTIVE references."
            echo "Download the 'legacy-audit-report' artifact for full details."
            exit 1
          fi
          echo "✅ Legacy module-path auditor: 0 active references."

      - name: Upload legacy audit report
        if: always() && needs.sha-check.outputs.already-built != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: legacy-audit-report
          path: audit-reports/
          retention-days: 14
          if-no-files-found: ignore

  # ─── Vulnerability scan ────────────────────────────────────
  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [sha-check]
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed — skipping vulncheck"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        if: needs.sha-check.outputs.already-built != 'true'
        run: go mod download

      - name: Install govulncheck
        if: needs.sha-check.outputs.already-built != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          set +e
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out
          rc=$?
          if [ $rc -ne 0 ]; then
            if grep "packages you import" /tmp/vulncheck.out | grep -qv "0 vulnerabilities in packages"; then
              echo "::error::Third-party vulnerabilities detected"
              exit 1
            fi
            echo "::warning::Only stdlib vulnerabilities found (no fix available in current Go version)"
          fi

  # ─── Tests (parallel matrix) ───────────────────────────────
  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [sha-check, lint, vulncheck]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            packages: ./...
          - name: integration
            packages: ./db/...
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed — skipping tests"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        if: needs.sha-check.outputs.already-built != 'true'
        run: go mod download

      - name: Run tests
        id: run-tests
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          go test ${{ matrix.packages }} -v -count=1 \
            -coverprofile=coverage-${{ matrix.name }}.out \
            -covermode=atomic 2>&1 | tee test-output.txt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && needs.sha-check.outputs.already-built != 'true'
        with:
          name: test-results-${{ matrix.name }}
          path: |
            test-output.txt
            coverage-${{ matrix.name }}.out
          retention-days: 7

  # ─── Test summary + SHA cache write ────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [sha-check, test]
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed"

      - name: Download test results
        if: needs.sha-check.outputs.already-built != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: results

      - name: Summarize test results
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          overall=0
          for dir in results/test-results-*; do
            suite=$(basename "$dir" | sed 's/test-results-//')
            file="$dir/test-output.txt"
            [ ! -f "$file" ] && continue

            pass=$(grep -c '^--- PASS:' "$file" || true)
            fail=$(grep -c '^--- FAIL:' "$file" || true)

            if [ "$fail" -gt 0 ]; then
              overall=1
              echo "❌ $suite: $fail failed, $pass passed"
              grep -E -A 3 '^--- FAIL:' "$file" || true
            else
              echo "✅ $suite: $pass passed"
            fi
          done

          if ls results/test-results-*/coverage-*.out 1>/dev/null 2>&1; then
            echo ""
            echo "📊 Coverage:"
            for cov in results/test-results-*/coverage-*.out; do
              [ ! -s "$cov" ] && continue
              echo "  $(basename "$cov")"
            done
          fi

          if [ "$overall" -ne 0 ]; then
            echo "::error::Some test suites failed"
            exit 1
          fi
          echo ""
          echo "All test suites passed."

      - name: Mark SHA as built
        if: success() && needs.sha-check.outputs.already-built != 'true'
        run: mkdir -p /tmp/ci-passed && echo "${{ github.sha }}" > /tmp/ci-passed/sha.txt

      - name: Save SHA to cache
        if: success() && needs.sha-check.outputs.already-built != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}

  # ─── Cross-compiled builds (matrix) ────────────────────────
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [sha-check, test-summary]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, arch: amd64, ext: .exe }
          - { os: windows, arch: arm64, ext: .exe }
          - { os: linux,   arch: amd64, ext: "" }
          - { os: linux,   arch: arm64, ext: "" }
          - { os: darwin,  arch: amd64, ext: "" }
          - { os: darwin,  arch: arm64, ext: "" }
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed — skipping build"

      - uses: actions/checkout@v6
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        if: needs.sha-check.outputs.already-built != 'true'
        run: go mod download

      - name: Embed icon (Windows only)
        if: needs.sha-check.outputs.already-built != 'true' && matrix.os == 'windows'
        run: |
          go install github.com/tc-hib/go-winres@v0.3.3
          go-winres init
          if [ -f "assets/icon.ico" ]; then
            cp assets/icon.ico winres/icon.ico
            cp assets/icon.ico winres/icon16.ico
          elif [ -f "assets/icon.png" ]; then
            cp assets/icon.png winres/icon.png
            cp assets/icon.png winres/icon16.png
          fi
          go-winres make

      - name: Build binary
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          VERSION="dev-${GITHUB_SHA::10}"
          LDFLAGS="-s -w \
            -X 'github.com/alimtvnetwork/movie-cli-v7/version.Version=$VERSION' \
            -X 'github.com/alimtvnetwork/movie-cli-v7/version.Commit=${GITHUB_SHA::10}' \
            -X 'github.com/alimtvnetwork/movie-cli-v7/version.BuildDate=$(date -u +%Y-%m-%d)'"
          OUTPUT="movie-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags "$LDFLAGS" -o "$OUTPUT" .
          echo "Built: $OUTPUT ($(stat --format='%s' "$OUTPUT" | numfmt --to=iec --suffix=B))"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          name: movie-${{ matrix.os }}-${{ matrix.arch }}
          path: movie-*
          retention-days: 14

  # ─── Build summary ─────────────────────────────────────────
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [sha-check, build]
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed"

      - name: Download all binaries
        if: needs.sha-check.outputs.already-built != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: movie-*
          path: binaries

      - name: Print build summary
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          echo ""
          echo "📦 Build artifacts:"
          printf "  %-45s %s\n" "Binary" "Size"
          printf "  %-45s %s\n" "-----" "----"
          for dir in binaries/*; do
            for file in "$dir"/*; do
              [ ! -f "$file" ] && continue
              name=$(basename "$file")
              size=$(stat --format="%s" "$file")
              human=$(numfmt --to=iec --suffix=B "$size")
              printf "  %-45s %s\n" "$name" "$human"
            done
          done
          echo ""
          echo "✅ All builds complete."
