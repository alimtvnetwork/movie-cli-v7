<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" role="img" aria-label="movie config">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="6" y="6" width="888" height="348" rx="10" ry="10" fill="#0f1419" stroke="#2a3340" stroke-width="1" filter="url(#sh)"/>
  <rect x="6" y="6" width="888" height="38" rx="10" ry="10" fill="#1c232b"/>
  <rect x="6" y="34" width="888" height="10" fill="#1c232b"/>
  <circle cx="26" cy="25.0" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="25.0" r="6" fill="#febc2e"/>
  <circle cx="66" cy="25.0" r="6" fill="#28c840"/>
  <text x="450.0" y="29.0" text-anchor="middle" fill="#7a8694" font-family="ui-sans-serif, system-ui" font-size="12">movie config</text>
  <text x="22" y="68" fill="#5fd7ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">$ movie config</text>
  <text x="22" y="90" fill="#82aaff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">⚙  Current configuration</text>
  <text x="22" y="112" fill="#d6deeb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">  movies_dir    = /home/you/Movies</text>
  <text x="22" y="134" fill="#d6deeb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">  tv_dir        = /home/you/TVShows</text>
  <text x="22" y="156" fill="#d6deeb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">  scan_dir      = /home/you/Downloads</text>
  <text x="22" y="178" fill="#d6deeb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">  tmdb_api_key  = ********  (set)</text>
  <text x="22" y="200" fill="#d6deeb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">  page_size     = 20</text>
  <text x="22" y="222" fill="#d6deeb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"></text>
  <text x="22" y="244" fill="#5fd7ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">$ movie config set tmdb_api_key YOUR_KEY</text>
  <text x="22" y="266" fill="#7bd88f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">✓ tmdb_api_key updated</text>
  <text x="22" y="288" fill="#d6deeb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"></text>
  <text x="22" y="310" fill="#5fd7ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">$ movie version</text>
  <text x="22" y="332" fill="#e6e6e6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve">movie-cli v2.172.0 (commit: a1b2c3d, built: 2026-04-26)</text>
</svg>
